services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: engram-postgres
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
      POSTGRES_DB: memory_agent
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d memory_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
